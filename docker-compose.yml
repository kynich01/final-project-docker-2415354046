services:

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: userdb
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  app:
    build:
      context: ./app
    container_name: nodejs_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./app/.env
    depends_on:
      - db
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network: